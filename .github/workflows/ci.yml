name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # 既存コードに react-hooks 系エラーが残っているため当面 non-blocking（解消後にこの行を外す）
      - run: npm run lint
        continue-on-error: true
      - run: npm run build
        env:
          NEXT_PUBLIC_POCKETBASE_URL: https://baby-food-pb-production.up.railway.app
